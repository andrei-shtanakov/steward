# Governance caller (ADR-ECO-004 D5). Thin caller: a pinned reference to the reusable gate
# workflow at ai-orchestrators-workspace/.github/workflows/governance-gate.yml@governance-v1
# (the checks it runs live under ci/governance/). No code is copied here. The `governance-v1`
# tag is the pin, kept immutable by the umbrella's `governance-*` tag ruleset (retag/delete
# blocked) — not by git tag semantics, which allow moving a tag.
name: governance
permissions:
  contents: read          # gate only reads (2× checkout of public repos); least-privilege
on:
  pull_request:
  workflow_dispatch:

jobs:
  governance:
    uses: andrei-shtanakov/ai-orchestrators-workspace/.github/workflows/governance-gate.yml@governance-v1
    with:
      umbrella-ref: "governance-v1"   # same tag as the uses: pin above
      strict: true
      runtime-scan: true        # runtime code — GOV-003 applies
      authority-guard: false    # holds no authority-root paths
