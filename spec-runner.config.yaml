executor:
  auto_commit: true
  claude_command: claude
  commands:
    lint: uv run ruff check .
    test: uv run pytest
  hooks:
    post_done:
      auto_commit: true
      run_lint: false
      run_tests: false
    pre_start:
      create_git_branch: true
  main_branch: feature/gov-risk-classify-docs
  max_retries: 1
  task_timeout_minutes: 20
